        <!-- Aplicar tema light como padrão -->
        <script>
            (function() {
                // v2.35.6: Forçar reset para tema claro (nova versão de branding)
                const themeVersion = localStorage.getItem('transmill-theme-version');
                if (themeVersion !== '2.35.6') {
                    // Reset para tema claro em nova versão
                    localStorage.setItem('transmill-theme', 'light');
                    localStorage.setItem('transmill-theme-version', '2.35.6');
                    document.documentElement.classList.remove('dark');
                } else {
                    const savedTheme = localStorage.getItem('transmill-theme');
                    const theme = savedTheme || 'light';
                    if (theme === 'dark') {
                        document.documentElement.classList.add('dark');
                    }
                    if (!savedTheme) {
                        localStorage.setItem('transmill-theme', 'light');
                    }
                }
            })();
            
            // Exibir versão no console
            (function() {
                console.log('%c🚀 Transmill API', 'color: #2fa31c; font-size: 20px; font-weight: bold;');
                console.log('%cVerificando versão do sistema...', 'color: #1a59ad; font-size: 12px;');
                
                // Buscar versão do backend
                fetch('/api/health')
                    .then(r => r.json())
                    .then(d => {
                        console.log('%c✅ Backend Version: ' + d.version, 'color: #2fa31c; font-size: 14px; font-weight: bold;');
                        console.log('%c📅 Timestamp: ' + new Date(d.timestamp).toLocaleString('pt-BR'), 'color: #666; font-size: 12px;');
                        console.log('%c💾 Database: ' + d.database, 'color: ' + (d.database === 'connected' ? '#2fa31c' : '#e74c3c') + '; font-size: 12px;');
                        
                        // Salvar versão no localStorage para fácil acesso
                        localStorage.setItem('transmill-backend-version', d.version);
                        window.TRANSMILL_VERSION = d.version;
                    })
                    .catch(err => {
                        console.error('%c❌ Erro ao verificar versão:', 'color: #e74c3c; font-size: 12px;', err);
                    });
            })();
        </script>
